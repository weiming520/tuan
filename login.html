<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Kali测试 - 登录页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Monaco", "Consolas", monospace; /* 适配Kali终端字体风格 */
        }
        body {
            background: #1e1e1e; /* Kali深色背景 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: #2d2d2d;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); /* Kali绿色阴影 */
            width: 400px;
        }
        .login-box h1 {
            text-align: center;
            color: #00ff00;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #cccccc;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            background: #3d3d3d;
            border: 1px solid #00ff00;
            border-radius: 4px;
            color: #ffffff;
            font-size: 16px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00cc00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            color: #1e1e1e;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #00cc00;
        }
        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>KALI TEST LOGIN</h1>
        <div class="input-group">
            <label for="username">账号</label>
            <input type="text" id="username" placeholder="输入账号（初始：root）" required>
        </div>
        <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="输入密码（初始：kali）" required>
        </div>
        <button class="btn" id="loginBtn">登录</button>
        <div class="error-msg" id="errorMsg">账号或密码错误！</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
